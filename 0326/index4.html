<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box"></div>
    <script>
        const box = document.getElementById("box");
        for(i=1; i<101; i++){
            if(i % 10 == 1){
                box.innerHTML+= `<br>`
            }
            box.innerHTML += `<button>${i}</button>`
        }
    </script>
</body>
</html>
